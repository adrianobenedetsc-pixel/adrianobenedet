<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adriano Benedet | Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(212, 175, 55, 0.09) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 1;
      max-width: 920px;
      padding: 40px 20px;
      width: 100%;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 10px;
      text-shadow: 0 0 50px rgba(212, 175, 55, 0.6);
      letter-spacing: 2px;
    }

    .title {
      font-size: clamp(1.1rem, 4vw, 1.7rem);
      color: #aaaaaa;
      margin-bottom: 50px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .divider {
      width: 160px;
      height: 2px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 40px auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 10px;
    }

    .btn {
      background: rgba(30, 30, 30, 0.7);
      color: #e0e0e0;
      border: 1.5px solid rgba(212, 175, 55, 0.4);
      padding: 22px 24px;
      font-size: clamp(1.05rem, 3.5vw, 1.2rem);
      font-weight: 500;
      border-radius: 16px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: #d4af37;
      color: #ffffff;
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
    }

    .btn i {
      font-size: 1.5rem;
      opacity: 0.9;
    }

    footer {
      margin-top: 80px;
      color: #555;
      font-size: 0.95rem;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 15px;
      }
      .buttons {
        gap: 16px;
      }
      .btn {
        padding: 20px 18px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1 class="name">ADRIANO BENDEDET</h1>
    <p class="title">links</p>
    
    <div class="divider"></div>

    <div class="buttons">
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/apresentacaosalomao.html" target="_blank" class="btn">
        <i class="fas fa-book-open"></i>
        Apresentação Manual da riqueza
      </a>
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/provasalomao.html" target="_blank" class="btn">
        <i class="fas fa-scroll"></i>
        Prova Manual da riqueza
      </a>
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/apresetacaodevedor.html" target="_blank" class="btn">
        <i class="fas fa-book-open"></i>
        Apresentação Manual do devedor profissional
      </a>
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/provadevedor.html" target="_blank" class="btn">
        <i class="fas fa-scroll"></i>
        Prova Manual do devedor profissional
      </a>
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/apresetacaonegociador.html" target="_blank" class="btn">
        <i class="fas fa-book-open"></i>
        Apresentação Manual do negociador
      </a>
      <a href="https://adrianobenedetsc-pixel.github.io/adrianobenedet/provanegociador.html" target="_blank" class="btn">
        <i class="fas fa-scroll"></i>
        Prova Manual do negociador
      </a>
    </div>

    <footer>
      © 2026 Adriano Benedet • Todos os direitos reservados
    </footer>
  </div>
</body>
</html>
